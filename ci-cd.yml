name: CI/CD Pipeline

on:
  push:
    branches: [develop, stage, main]
  pull_request:
    branches: [develop, stage, main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - run: npm install
      - run: npm run build
      - run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            myrepo/myapp:${{ github.sha }}
            myrepo/myapp:${{ github.ref_name }}
            myrepo/myapp:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    env:
      DEV_SERVER: ${{ secrets.DEV_SERVER }}
      STAGE_SERVER: ${{ secrets.STAGE_SERVER }}
      PROD_SERVER: ${{ secrets.PROD_SERVER }}
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Environment
        run: |
          if [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "Deploying to Dev server..."
            ssh ec2-user@$DEV_SERVER "docker pull myrepo/myapp:${{ github.ref_name }} && docker-compose up -d"
          elif [[ "${{ github.ref_name }}" == "stage" ]]; then
            echo "Deploying to Stage server..."
            ssh ec2-user@$STAGE_SERVER "docker pull myrepo/myapp:${{ github.ref_name }} && docker-compose up -d"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "Deploying to Prod server..."
            ssh ec2-user@$PROD_SERVER "docker pull myrepo/myapp:${{ github.ref_name }} && docker-compose up -d"

      - name: Health Check
        run: |
          curl -f http://$PROD_SERVER/health || exit 1
