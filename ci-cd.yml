name: CI/CD Pipeline

on:
  push:
    branches: [develop, stage, main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            myrepo/myapp:${{ github.sha }}
            myrepo/myapp:${{ github.ref_name }}
            myrepo/myapp:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    env:
      DEV_SERVER: ${{ secrets.DEV_SERVER }}
      STAGE_SERVER: ${{ secrets.STAGE_SERVER }}
      PROD_SERVER: ${{ secrets.PROD_SERVER }}
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy by Branch
        run: |
         if [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "Deploying to Dev server..."
            ssh ubuntu@$DEV_SERVER "
              docker pull myrepo/myapp:${{ github.sha }} &&
              docker-compose --env-file .env.dev up -d
            "
         elif [[ "${{ github.ref_name }}" == "main" ]]; then
          echo "Deploying to Prod server with Blue-Green strategy..."
          ssh ec2-user@$PROD_SERVER "
            sudo apt-get update &&
            sudo apt-get install -y docker.io docker-compose nginx &&
            sudo systemctl enable docker &&
            sudo systemctl enable nginx

          docker-compose -f docker-compose.green.yml --env-file .env.prod pull &&
          docker-compose -f docker-compose.green.yml --env-file .env.prod up -d

          until curl -f http://localhost:8081/health; do
            echo 'Waiting for Green service...'
            sleep 5
          done

            sudo ln -sf /etc/nginx/conf.d/app-green.conf /etc/nginx/conf.d/app.conf
            sudo systemctl reload nginx

          docker-compose -f docker-compose.blue.yml down
  "


