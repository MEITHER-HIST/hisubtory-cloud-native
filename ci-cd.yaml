name: CI/CD Pipeline

on:
  push:
    branches: [develop, stage, main]
  pull_request:
    branches: [develop, stage, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: ./dist

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ./dist

      - name: Run Tests
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' # PR에서는 Docker 빌드 제외
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t my-app:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag my-app:${{ github.sha }} myrepo/my-app:${{ github.sha }}
          docker tag my-app:${{ github.sha }} myrepo/my-app:${{ github.ref_name }}
          docker push myrepo/my-app:${{ github.sha }}
          docker push myrepo/my-app:${{ github.ref_name }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    env:
      DEV_SERVER: ${{ secrets.DEV_SERVER }}
      STAGE_SERVER: ${{ secrets.STAGE_SERVER }}
      PROD_SERVER: ${{ secrets.PROD_SERVER }}
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Environment
        run: |
          if [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "Deploying to Dev server..."
            ssh user@$DEV_SERVER "docker pull myrepo/my-app:${{ github.ref_name }} && docker-compose up -d"
          elif [[ "${{ github.ref_name }}" == "stage" ]]; then
            echo "Deploying to Stage server..."
            ssh user@$STAGE_SERVER "docker pull myrepo/my-app:${{ github.ref_name }} && docker-compose up -d"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "Deploying to Prod server with Blue-Green strategy..."
            ssh user@$PROD_SERVER "
              docker-compose -f docker-compose.blue.yml up -d &&
              docker-compose -f docker-compose.green.yml down
            "
          fi

      - name: Health Check
        run: |
          curl -f http://$PROD_SERVER/health || exit 1
