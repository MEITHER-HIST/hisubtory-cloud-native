name: Deploy to Amazon ECS

on:
  push:
    branches:
      - feat/do

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: hisubtory-app
  ECS_SERVICE: hisubtory-service
  ECS_CLUSTER: hisubtory-cluster
  ECS_TASK_DEFINITION: .github/workflows/task-definition.json
  CONTAINER_NAME: app

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Inject Secrets into task-definition.json
      env:
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        SB_DB_PASSWORD: ${{ secrets.SB_DB_PASSWORD }}
        REDIS_HOST: ${{ secrets.REDIS_HOST }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_STORAGE_BUCKET_NAME: ${{ secrets.AWS_STORAGE_BUCKET_NAME }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        DEBUG: ${{ secrets.DEBUG }}
      run: |
        python3 -c "
        import os, json
        with open('.github/workflows/task-definition.json', 'r') as f:
            data = json.load(f)
        
        secrets_map = {
            'DB_PASSWORD': os.environ.get('DB_PASSWORD', '').strip(),
            'SB_DB_PASSWORD': os.environ.get('SB_DB_PASSWORD', 'hisubtory1234').strip(),
            'SB_DB_USER': 'postgres.jlvhwihvmivvihffhxse',
            'SB_DB_HOST': 'aws-1-ap-northeast-2.pooler.supabase.com',
            'SB_DB_PORT': '5432',
            'SB_DB_NAME': 'postgres',
            'REDIS_HOST': os.environ.get('REDIS_HOST', '').strip(),
            'AWS_ACCESS_KEY_ID': os.environ.get('AWS_ACCESS_KEY_ID', '').strip(),
            'AWS_SECRET_ACCESS_KEY': os.environ.get('AWS_SECRET_ACCESS_KEY', '').strip(),
            'AWS_STORAGE_BUCKET_NAME': os.environ.get('AWS_STORAGE_BUCKET_NAME', '').strip(),
            'SUPABASE_URL': os.environ.get('SUPABASE_URL', '').strip(),
            'SUPABASE_KEY': os.environ.get('SUPABASE_KEY', '').strip(),
            'SECRET_KEY': os.environ.get('SECRET_KEY', '').strip(),
            'DEBUG': os.environ.get('DEBUG', 'False').strip()
        }
        
        for container in data.get('containerDefinitions', []):
            for env_var in container.get('environment', []):
                name = env_var.get('name')
                if name in secrets_map:
                    env_var['value'] = secrets_map[name]
        
        with open('.github/workflows/task-definition.json', 'w') as f:
            json.dump(data, f, indent=2)
        "

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
