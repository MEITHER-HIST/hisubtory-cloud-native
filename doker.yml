name: Docker Build & Push

on:
  push:
    branches: [develop, stage, main]
  pull_request:
    branches: [develop, stage, main]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            ${{ secrets.DOCKER_REGISTRY }} --password-stdin

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/myrepo/myapp:${{ github.sha }}
            ${{ secrets.DOCKER_REGISTRY }}/myrepo/myapp:${{ github.ref_name }}
            ${{ secrets.DOCKER_REGISTRY }}/myrepo/myapp:latest
