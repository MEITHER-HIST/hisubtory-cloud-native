server {
    listen 80;

    # 1. 메인 페이지 및 기본 라우팅
    location / {
        proxy_pass http://user-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. User 서비스 API 라우팅 (Django 내부 경로는 /api/accounts/)
    location /api/user/ {
        rewrite ^/api/user/(.*)$ /api/accounts/$1 break;
        proxy_pass http://user-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Story 서비스 API 라우팅 (Django 내부 경로는 /api/stories/)
    location /api/stories/ {
        proxy_pass http://story-service:8000;
        proxy_set_header Host $host;
    }

    # 4. Activity 서비스 API 라우팅 (Django 내부 경로는 /api/bookmarks/, /api/pages/)
    location /api/bookmarks/ {
        proxy_pass http://activity-service:8000;
        proxy_set_header Host $host;
    }

    location /api/activity/ {
        proxy_pass http://activity-service:8000;
        proxy_set_header Host $host;
    }

    # 5. Pages API 라우팅 (activity-service에서 담당)
    location /api/pages/ {
        proxy_pass http://activity-service:8000;
        proxy_set_header Host $host;
    }

    # 6. Static 및 Media 서빙 (필요 시 Nginx에서 직접 처리)
    location /static/ {
        proxy_pass http://user-service:8000/static/;
    }

    location /media/ {
        proxy_pass http://user-service:8000/media/;
    }
}
