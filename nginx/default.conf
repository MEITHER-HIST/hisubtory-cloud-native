server {
    listen 80;

    # 메인 페이지 및 기본 라우팅
    location / {
        proxy_pass http://user-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # User 서비스 API 라우팅
    location /api/user/ {
        proxy_pass http://user-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Story 서비스 API 라우팅
    location /api/stories/ {
        proxy_pass http://story-service:8000;
        proxy_set_header Host $host;
    }

    # Bookmarks (Activity) 서비스 API 라우팅
    location /api/bookmarks/ {
        proxy_pass http://activity-service:8000;
        proxy_set_header Host $host;
    }

    # Activity 서비스 API 라우팅 (기본)
    location /api/activity/ {
        proxy_pass http://activity-service:8000;
        proxy_set_header Host $host;
    }
}
