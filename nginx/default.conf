server {
    listen 80;

    # 1. 프론트엔드 정적 파일
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Accounts (User Service)
    location /api/accounts/ {
        proxy_pass http://hisubtory-user:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 인증 헤더 전달
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_set_header Cookie $http_cookie;
    }

    # 3. Stories (Story Service)
    location /api/stories/ {
        proxy_pass http://hisubtory-story:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # 4. Pages (Activity Service)
    location /api/pages/ {
        proxy_pass http://hisubtory-activity:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # 5. Library (Activity Service)
    location /api/library/ {
        proxy_pass http://hisubtory-activity:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # 6. Static/Media
    location /static/ {
        proxy_pass http://hisubtory-user:8000/static/;
    }
    location /media/ {
        proxy_pass http://hisubtory-user:8000/media/;
    }
}
