version: '3.8'

services:
  # 1. API Gateway (Nginx)
  gateway:
    image: nginx:latest
    container_name: hisubtory-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user-service
      - story-service
      - activity-service

  # 2. User Service
  user-service:
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    container_name: hisubtory-user
    expose:
      - "8000"
    env_file: .env
    environment:
      - OTEL_SERVICE_NAME=user-service
    depends_on:
      - jaeger
      - db-postgres
      - db-mysql

  # 3. Story Service
  story-service:
    build:
      context: .
      dockerfile: ./story-service/Dockerfile
    container_name: hisubtory-story
    expose:
      - "8000"
    env_file: .env
    environment:
      - OTEL_SERVICE_NAME=story-service
    depends_on:
      - jaeger
      - db-mysql

  # 4. Activity Service
  activity-service:
    build:
      context: .
      dockerfile: ./activity-service/Dockerfile
    container_name: hisubtory-activity
    expose:
      - "8000"
    env_file: .env
    environment:
      - OTEL_SERVICE_NAME=activity-service
    depends_on:
      - redis
      - jaeger
      - db-mysql

  # 5. Redis
  redis:
    image: redis:latest
    container_name: hisubtory-redis
    ports:
      - "6380:6379"

  # 6. Database: PostgreSQL (for Supabase compat)
  db-postgres:
    image: postgres:15
    container_name: hisubtory-db-pg
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: hisubtory1234
    ports:
      - "5433:5432"

  # 7. Database: MySQL
  db-mysql:
    image: mysql:8.0
    container_name: hisubtory-db-mysql
    environment:
      MYSQL_DATABASE: hisubtory_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: admin
      MYSQL_PASSWORD: mysql_password
    ports:
      - "3307:3306"

  # 8. Jaeger
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: hisubtory-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # 9. Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: hisubtory-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # 10. Loki
  loki:
    image: grafana/loki:latest
    container_name: hisubtory-loki
    ports:
      - "3100:3100"

  # 11. Promtail
  promtail:
    image: grafana/promtail:latest
    container_name: hisubtory-promtail
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml

  # 12. Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: hisubtory-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - jaeger
